<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="出版社向け簡易組版アプリ v002">
  <title>組版アプリ v002</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-block">
        <strong>組版アプリ</strong>
        <span class="version-badge">v002</span>
      </div>

      <label class="project-name-wrap">
        <span>プロジェクト名</span>
        <input id="projectName" type="text" value="新規組版データ" maxlength="80">
      </label>

      <div class="toolbar" aria-label="ファイル操作">
        <button id="newBtn" type="button" class="button secondary">新規</button>
        <button id="projectsBtn" type="button" class="button secondary">プロジェクト</button>
        <button id="saveBtn" type="button" class="button secondary">保存</button>
        <button id="duplicateBtn" type="button" class="button secondary">複製</button>
        <button id="templatesBtn" type="button" class="button secondary">テンプレート</button>
        <button id="exportBtn" type="button" class="button secondary">JSON出力</button>
        <button id="importBtn" type="button" class="button secondary">JSON読込</button>
        <button id="printBtn" type="button" class="button primary">PDF出力</button>
        <input id="importFile" type="file" accept="application/json,.json" hidden>
      </div>
    </header>

    <main class="workspace">
      <section class="panel manuscript-panel" aria-labelledby="manuscriptTitle">
        <div class="panel-header">
          <div>
            <p class="eyebrow">MANUSCRIPT</p>
            <h1 id="manuscriptTitle">原稿入力</h1>
          </div>
          <span id="charCount" class="count-badge">0文字</span>
        </div>

        <div class="panel-scroll">
          <label class="field">
            <span>タイトル</span>
            <input id="titleInput" type="text" value="サンプルタイトル" placeholder="書名・記事タイトル">
          </label>

          <label class="field">
            <span>サブタイトル</span>
            <input id="subtitleInput" type="text" value="自動組版の確認用原稿" placeholder="不要な場合は空欄">
          </label>

          <label class="field">
            <span>著者名</span>
            <input id="authorInput" type="text" value="著者名" placeholder="不要な場合は空欄">
          </label>

          <label class="field body-field">
            <span>本文</span>
            <textarea id="bodyInput" spellcheck="false" placeholder="ここに本文を貼り付けてください。">これは、組版アプリv002の動作確認用原稿です。

右側の設定を変更すると、用紙サイズ、余白、フォント、文字サイズ、文字間、行間が中央のプレビューへ自動反映されます。本文は空行ごとに段落として扱われ、ページ内に収まらない場合は自動的に次のページへ送られます。

v002では、複数のプロジェクトをブラウザ内へ個別保存できます。右上の「プロジェクト」から保存済み案件を開き、複製、削除できます。

また、現在の組版設定だけをテンプレートとして保存できます。原稿内容はテンプレートに含まれないため、別の案件へ同じ判型や文字設定を安全に適用できます。

JSON出力は、バックアップや別端末への移動に使用してください。PDFとして保存する際は、右上の「PDF出力」を押し、ブラウザの印刷画面で余白なし、倍率100%を推奨します。</textarea>
          </label>
        </div>
      </section>

      <section class="preview-panel" aria-labelledby="previewTitle">
        <div class="preview-toolbar">
          <div>
            <p class="eyebrow">PREVIEW</p>
            <h2 id="previewTitle">ページプレビュー</h2>
          </div>

          <div class="preview-controls">
            <label>
              <span>表示</span>
              <select id="viewMode">
                <option value="single">1ページ</option>
                <option value="spread">見開き</option>
              </select>
            </label>
            <label>
              <span>倍率</span>
              <select id="zoomSelect">
                <option value="0.55">55%</option>
                <option value="0.7" selected>70%</option>
                <option value="0.85">85%</option>
                <option value="1">100%</option>
              </select>
            </label>
            <button id="toggleGuidesBtn" type="button" class="button ghost" aria-pressed="true">余白ガイド</button>
          </div>
        </div>

        <div id="previewViewport" class="preview-viewport">
          <div id="pages" class="pages single" aria-live="polite"></div>
        </div>

        <footer class="preview-footer">
          <span id="pageCount">1ページ</span>
          <span id="currentProjectStatus">新規プロジェクト</span>
          <span id="saveStatus">未保存</span>
        </footer>
      </section>

      <aside class="panel settings-panel" aria-labelledby="settingsTitle">
        <div class="panel-header">
          <div>
            <p class="eyebrow">SETTINGS</p>
            <h2 id="settingsTitle">組版設定</h2>
          </div>
          <button id="resetSettingsBtn" type="button" class="text-button">初期値に戻す</button>
        </div>

        <div class="panel-scroll settings-scroll">
          <fieldset>
            <legend>用紙</legend>

            <label class="field">
              <span>プリセット</span>
              <select id="paperPreset">
                <option value="A4">A4（210 × 297 mm）</option>
                <option value="A5" selected>A5（148 × 210 mm）</option>
                <option value="B6">B6（128 × 182 mm）</option>
                <option value="custom">自由入力</option>
              </select>
            </label>

            <div class="field-grid two">
              <label class="field compact">
                <span>幅（mm）</span>
                <input id="pageWidth" type="number" min="80" max="500" step="0.1" value="148">
              </label>
              <label class="field compact">
                <span>高さ（mm）</span>
                <input id="pageHeight" type="number" min="80" max="500" step="0.1" value="210">
              </label>
            </div>
          </fieldset>

          <fieldset>
            <legend>余白</legend>
            <div class="field-grid two">
              <label class="field compact">
                <span>上（mm）</span>
                <input id="marginTop" type="number" min="0" max="100" step="0.5" value="15">
              </label>
              <label class="field compact">
                <span>下（mm）</span>
                <input id="marginBottom" type="number" min="0" max="100" step="0.5" value="18">
              </label>
              <label class="field compact">
                <span>左（mm）</span>
                <input id="marginLeft" type="number" min="0" max="100" step="0.5" value="18">
              </label>
              <label class="field compact">
                <span>右（mm）</span>
                <input id="marginRight" type="number" min="0" max="100" step="0.5" value="15">
              </label>
            </div>
          </fieldset>

          <fieldset>
            <legend>本文</legend>

            <label class="field">
              <span>フォント</span>
              <select id="fontFamily">
                <option value="'Noto Serif JP', 'Yu Mincho', 'Hiragino Mincho ProN', serif">明朝体</option>
                <option value="'Noto Sans JP', 'Yu Gothic', 'Hiragino Kaku Gothic ProN', sans-serif">ゴシック体</option>
                <option value="'Yu Mincho', serif">游明朝</option>
                <option value="'Yu Gothic', sans-serif">游ゴシック</option>
                <option value="serif">端末の標準明朝</option>
                <option value="sans-serif">端末の標準ゴシック</option>
              </select>
            </label>

            <div class="field-grid two">
              <label class="field compact">
                <span>文字サイズ（pt）</span>
                <input id="fontSize" type="number" min="5" max="40" step="0.1" value="9">
              </label>
              <label class="field compact">
                <span>行間（pt）</span>
                <input id="lineHeight" type="number" min="6" max="60" step="0.1" value="15">
              </label>
              <label class="field compact">
                <span>文字間（em）</span>
                <input id="letterSpacing" type="number" min="-0.2" max="1" step="0.01" value="0.02">
              </label>
              <label class="field compact">
                <span>字下げ（文字）</span>
                <input id="textIndent" type="number" min="0" max="10" step="0.5" value="1">
              </label>
            </div>

            <label class="field">
              <span>文字揃え</span>
              <select id="textAlign">
                <option value="justify" selected>両端揃え</option>
                <option value="left">左揃え</option>
                <option value="center">中央揃え</option>
                <option value="right">右揃え</option>
              </select>
            </label>
          </fieldset>

          <fieldset>
            <legend>タイトル</legend>
            <div class="field-grid two">
              <label class="field compact">
                <span>サイズ（pt）</span>
                <input id="titleSize" type="number" min="8" max="72" step="0.5" value="20">
              </label>
              <label class="field compact">
                <span>本文まで（mm）</span>
                <input id="titleBottom" type="number" min="0" max="80" step="0.5" value="14">
              </label>
            </div>

            <label class="field">
              <span>揃え</span>
              <select id="titleAlign">
                <option value="left">左揃え</option>
                <option value="center" selected>中央揃え</option>
                <option value="right">右揃え</option>
              </select>
            </label>
          </fieldset>

          <fieldset>
            <legend>ページ</legend>
            <label class="check-row">
              <input id="showPageNumbers" type="checkbox" checked>
              <span>ページ番号を表示</span>
            </label>
            <label class="check-row">
              <input id="firstPageNumber" type="checkbox">
              <span>1ページ目にも番号を表示</span>
            </label>
          </fieldset>
        </div>
      </aside>
    </main>
  </div>

  <div id="measureRoot" class="measure-root" aria-hidden="true"></div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <div id="projectsModal" class="modal-backdrop" hidden>
    <section class="modal-card wide" role="dialog" aria-modal="true" aria-labelledby="projectsModalTitle">
      <header class="modal-header">
        <div>
          <p class="eyebrow">LOCAL PROJECTS</p>
          <h2 id="projectsModalTitle">保存済みプロジェクト</h2>
        </div>
        <button type="button" class="icon-button" data-close-modal="projectsModal" aria-label="閉じる">×</button>
      </header>
      <div class="modal-toolbar">
        <p id="projectStorageSummary" class="helper-text">このブラウザ内に保存されます。</p>
        <button id="createProjectFromModalBtn" type="button" class="button modal-primary">新規プロジェクト</button>
      </div>
      <div id="projectList" class="library-list"></div>
    </section>
  </div>

  <div id="templatesModal" class="modal-backdrop" hidden>
    <section class="modal-card wide" role="dialog" aria-modal="true" aria-labelledby="templatesModalTitle">
      <header class="modal-header">
        <div>
          <p class="eyebrow">TYPESETTING TEMPLATES</p>
          <h2 id="templatesModalTitle">組版テンプレート</h2>
        </div>
        <button type="button" class="icon-button" data-close-modal="templatesModal" aria-label="閉じる">×</button>
      </header>
      <div class="template-create-row">
        <label class="field template-name-field">
          <span>テンプレート名</span>
          <input id="templateNameInput" type="text" maxlength="80" placeholder="例：A5 文芸書 基本設定">
        </label>
        <button id="saveTemplateBtn" type="button" class="button modal-primary">現在の設定を保存</button>
      </div>
      <p class="helper-text template-note">テンプレートには用紙、余白、本文、タイトル、ページ設定だけを保存します。原稿内容は含まれません。</p>
      <div id="templateList" class="library-list"></div>
    </section>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
